<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- 破坏塔弹道：深灰金属炮弹 + 高光 -->

  <!-- Dark base (12-row stair-stepped circle) -->
  <rect x="28" y="8" width="8" height="4" fill="#1A1A1A"/>
  <rect x="24" y="12" width="16" height="4" fill="#1A1A1A"/>
  <rect x="20" y="16" width="24" height="4" fill="#1A1A1A"/>
  <rect x="16" y="20" width="32" height="4" fill="#1A1A1A"/>
  <rect x="12" y="24" width="40" height="4" fill="#1A1A1A"/>
  <rect x="12" y="28" width="40" height="4" fill="#1A1A1A"/>
  <rect x="12" y="32" width="40" height="4" fill="#1A1A1A"/>
  <rect x="12" y="36" width="40" height="4" fill="#1A1A1A"/>
  <rect x="16" y="40" width="32" height="4" fill="#1A1A1A"/>
  <rect x="20" y="44" width="24" height="4" fill="#1A1A1A"/>
  <rect x="24" y="48" width="16" height="4" fill="#1A1A1A"/>
  <rect x="28" y="52" width="8" height="4" fill="#1A1A1A"/>

  <!-- Main body (mid gray) -->
  <rect x="28" y="12" width="8" height="4" fill="#555555"/>
  <rect x="24" y="16" width="16" height="4" fill="#555555"/>
  <rect x="20" y="20" width="24" height="4" fill="#555555"/>
  <rect x="16" y="24" width="32" height="4" fill="#555555"/>
  <rect x="16" y="28" width="32" height="4" fill="#555555"/>
  <rect x="16" y="32" width="32" height="4" fill="#555555"/>
  <rect x="16" y="36" width="32" height="4" fill="#555555"/>
  <rect x="20" y="40" width="24" height="4" fill="#555555"/>
  <rect x="24" y="44" width="16" height="4" fill="#555555"/>
  <rect x="28" y="48" width="8" height="4" fill="#555555"/>

  <!-- Light highlight (upper-left shine) -->
  <rect x="20" y="20" width="8" height="4" fill="#888888"/>
  <rect x="16" y="24" width="12" height="4" fill="#888888"/>
  <rect x="12" y="28" width="8" height="4" fill="#888888"/>

  <!-- Top-left white highlight dot -->
  <rect x="20" y="24" width="4" height="4" fill="#BBBBBB"/>
</svg>
