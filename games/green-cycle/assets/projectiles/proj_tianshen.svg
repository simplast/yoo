<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- 天神弹道：金色神圣光球 + 白色十字核心 + 光晕 -->

  <!-- Trail dots (fading gold motion marks below) -->
  <rect x="30" y="60" width="4" height="4" fill="#B8860B"/>
  <rect x="28" y="56" width="8" height="4" fill="#FFD700"/>

  <!-- Halo outer rays (4 cardinal directions) -->
  <rect x="28" y="0" width="8" height="4" fill="#FFEC8B"/>
  <rect x="28" y="60" width="8" height="4" fill="#FFEC8B"/>
  <rect x="0" y="28" width="4" height="8" fill="#FFEC8B"/>
  <rect x="60" y="28" width="4" height="8" fill="#FFEC8B"/>

  <!-- Diagonal small rays -->
  <rect x="8" y="8" width="4" height="4" fill="#FFD700"/>
  <rect x="52" y="8" width="4" height="4" fill="#FFD700"/>
  <rect x="8" y="52" width="4" height="4" fill="#FFD700"/>
  <rect x="52" y="52" width="4" height="4" fill="#FFD700"/>

  <!-- Outer dark gold ring -->
  <rect x="20" y="12" width="24" height="4" fill="#8B6914"/>
  <rect x="16" y="16" width="32" height="4" fill="#8B6914"/>
  <rect x="12" y="20" width="40" height="4" fill="#8B6914"/>
  <rect x="12" y="24" width="40" height="4" fill="#8B6914"/>
  <rect x="12" y="28" width="40" height="4" fill="#8B6914"/>
  <rect x="12" y="32" width="40" height="4" fill="#8B6914"/>
  <rect x="12" y="36" width="40" height="4" fill="#8B6914"/>
  <rect x="12" y="40" width="40" height="4" fill="#8B6914"/>
  <rect x="16" y="44" width="32" height="4" fill="#8B6914"/>
  <rect x="20" y="48" width="24" height="4" fill="#8B6914"/>

  <!-- Mid gold body -->
  <rect x="20" y="16" width="24" height="4" fill="#B8860B"/>
  <rect x="16" y="20" width="32" height="4" fill="#B8860B"/>
  <rect x="16" y="24" width="32" height="4" fill="#B8860B"/>
  <rect x="16" y="28" width="32" height="4" fill="#B8860B"/>
  <rect x="16" y="32" width="32" height="4" fill="#B8860B"/>
  <rect x="16" y="36" width="32" height="4" fill="#B8860B"/>
  <rect x="16" y="40" width="32" height="4" fill="#B8860B"/>
  <rect x="20" y="44" width="24" height="4" fill="#B8860B"/>

  <!-- Light gold inner -->
  <rect x="20" y="20" width="24" height="4" fill="#FFD700"/>
  <rect x="16" y="24" width="32" height="4" fill="#FFD700"/>
  <rect x="16" y="28" width="32" height="4" fill="#FFD700"/>
  <rect x="16" y="32" width="32" height="4" fill="#FFD700"/>
  <rect x="16" y="36" width="32" height="4" fill="#FFD700"/>
  <rect x="20" y="40" width="24" height="4" fill="#FFD700"/>

  <!-- Brightest inner light -->
  <rect x="24" y="24" width="16" height="4" fill="#FFEC8B"/>
  <rect x="20" y="28" width="24" height="4" fill="#FFEC8B"/>
  <rect x="24" y="32" width="16" height="4" fill="#FFEC8B"/>

  <!-- White holy cross core -->
  <rect x="28" y="24" width="8" height="16" fill="#FFFFFF"/>
  <rect x="20" y="28" width="24" height="8" fill="#FFFFFF"/>
</svg>
