<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- 混乱塔弹道：紫色混沌球 + 核心辉光 + 水晶尖刺 -->

  <!-- Trail dots (fading purple motion marks below) -->
  <rect x="30" y="60" width="4" height="4" fill="#311B92"/>
  <rect x="28" y="56" width="8" height="4" fill="#4A148C"/>

  <!-- Crystalline spikes (4 corners) -->
  <rect x="28" y="0" width="8" height="4" fill="#E040FB"/>
  <rect x="0" y="28" width="4" height="8" fill="#E040FB"/>
  <rect x="60" y="28" width="4" height="8" fill="#E040FB"/>

  <!-- Side spike arms -->
  <rect x="24" y="4" width="4" height="4" fill="#AB47BC"/>
  <rect x="36" y="4" width="4" height="4" fill="#AB47BC"/>
  <rect x="4" y="32" width="4" height="4" fill="#AB47BC"/>
  <rect x="56" y="32" width="4" height="4" fill="#AB47BC"/>

  <!-- Outer dark layer (chaotic edge) -->
  <rect x="20" y="12" width="24" height="4" fill="#1A0533"/>
  <rect x="16" y="16" width="32" height="4" fill="#1A0533"/>
  <rect x="12" y="20" width="40" height="4" fill="#1A0533"/>
  <rect x="12" y="24" width="40" height="4" fill="#1A0533"/>
  <rect x="12" y="28" width="40" height="4" fill="#1A0533"/>
  <rect x="12" y="32" width="40" height="4" fill="#1A0533"/>
  <rect x="12" y="36" width="40" height="4" fill="#1A0533"/>
  <rect x="12" y="40" width="40" height="4" fill="#1A0533"/>
  <rect x="16" y="44" width="32" height="4" fill="#1A0533"/>
  <rect x="20" y="48" width="24" height="4" fill="#1A0533"/>

  <!-- Mid purple layer -->
  <rect x="20" y="16" width="24" height="4" fill="#6A1B9A"/>
  <rect x="16" y="20" width="32" height="4" fill="#6A1B9A"/>
  <rect x="16" y="24" width="32" height="4" fill="#6A1B9A"/>
  <rect x="16" y="28" width="32" height="4" fill="#6A1B9A"/>
  <rect x="16" y="32" width="32" height="4" fill="#6A1B9A"/>
  <rect x="16" y="36" width="32" height="4" fill="#6A1B9A"/>
  <rect x="16" y="40" width="32" height="4" fill="#6A1B9A"/>
  <rect x="20" y="44" width="24" height="4" fill="#6A1B9A"/>

  <!-- Light purple layer -->
  <rect x="20" y="20" width="24" height="4" fill="#9C27B0"/>
  <rect x="16" y="24" width="32" height="4" fill="#9C27B0"/>
  <rect x="16" y="28" width="32" height="4" fill="#9C27B0"/>
  <rect x="16" y="32" width="32" height="4" fill="#9C27B0"/>
  <rect x="16" y="36" width="32" height="4" fill="#9C27B0"/>
  <rect x="20" y="40" width="24" height="4" fill="#9C27B0"/>

  <!-- Bright core glow (white center) -->
  <rect x="24" y="24" width="16" height="4" fill="#E040FB"/>
  <rect x="20" y="28" width="24" height="4" fill="#E040FB"/>
  <rect x="20" y="32" width="24" height="4" fill="#E040FB"/>
  <rect x="24" y="36" width="16" height="4" fill="#E040FB"/>

  <!-- White hot center -->
  <rect x="28" y="28" width="8" height="8" fill="#FFFFFF"/>
</svg>
