  <rect x="16" y="28" width="4" height="4" fill="#558B2F"/>
  <rect x="44" y="32" width="4" height="4" fill="#558B2F"/>
  <rect x="16" y="36" width="4" height="4" fill="#2E7D32"/>
  <rect x="40" y="36" width="4" height="4" fill="#558B2F"/>
