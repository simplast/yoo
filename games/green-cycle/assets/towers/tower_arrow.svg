<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Stone Base -->
  <rect x="16" y="48" width="32" height="4" fill="#4A4A4A"/>
  <rect x="12" y="52" width="8" height="4" fill="#4A4A4A"/>
  <rect x="20" y="52" width="24" height="4" fill="#6B6B6B"/>
  <rect x="44" y="52" width="8" height="4" fill="#4A4A4A"/>
  <rect x="8" y="56" width="8" height="4" fill="#4A4A4A"/>
  <rect x="16" y="56" width="32" height="4" fill="#6B6B6B"/>
  <rect x="48" y="56" width="8" height="4" fill="#4A4A4A"/>
  <rect x="4" y="60" width="8" height="4" fill="#4A4A4A"/>
  <rect x="12" y="60" width="40" height="4" fill="#6B6B6B"/>
  <rect x="52" y="60" width="8" height="4" fill="#4A4A4A"/>

  <!-- Tower Body - Bottom Frame -->
  <rect x="20" y="44" width="28" height="4" fill="#3D2817"/>

  <!-- Tower Body - Row 10 -->
  <rect x="16" y="40" width="4" height="4" fill="#3D2817"/>
  <rect x="20" y="40" width="12" height="4" fill="#5C3A1E"/>
  <rect x="36" y="40" width="12" height="4" fill="#5C3A1E"/>
  <rect x="48" y="40" width="4" height="4" fill="#3D2817"/>

  <!-- Tower Body - Rows 7-9 (combined) -->
  <rect x="16" y="28" width="4" height="12" fill="#5C3A1E"/>
  <rect x="20" y="28" width="12" height="12" fill="#B8935A"/>
  <rect x="36" y="28" width="12" height="12" fill="#B8935A"/>
  <rect x="48" y="28" width="4" height="12" fill="#5C3A1E"/>

  <!-- Tower Body - Row 6 -->
  <rect x="16" y="24" width="4" height="4" fill="#3D2817"/>
  <rect x="20" y="24" width="12" height="4" fill="#5C3A1E"/>
  <rect x="36" y="24" width="12" height="4" fill="#5C3A1E"/>
  <rect x="48" y="24" width="4" height="4" fill="#3D2817"/>

  <!-- Tower Top Frame -->
  <rect x="20" y="20" width="12" height="4" fill="#3D2817"/>
  <rect x="36" y="20" width="12" height="4" fill="#3D2817"/>

  <!-- Bowstring (behind bow arms and arrow) -->
  <rect x="24" y="12" width="4" height="8" fill="#3D2817"/>
  <rect x="40" y="12" width="4" height="8" fill="#3D2817"/>

  <!-- Bow Arms - Top -->
  <rect x="4" y="12" width="20" height="4" fill="#9B6B3D"/>
  <rect x="44" y="12" width="20" height="4" fill="#9B6B3D"/>

  <!-- Bow Arms - Bottom -->
  <rect x="8" y="16" width="16" height="4" fill="#9B6B3D"/>
  <rect x="44" y="16" width="16" height="4" fill="#9B6B3D"/>

  <!-- Arrow Shaft -->
  <rect x="32" y="4" width="4" height="40" fill="#C49A6C"/>

  <!-- Arrow Tip -->
  <rect x="32" y="0" width="4" height="4" fill="#9E9E9E"/>
</svg>