<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- 顶部装饰 -->
  <rect x="24" y="4" width="16" height="4" fill="#999999"/>
  <rect x="20" y="8" width="24" height="4" fill="#808080"/>
  <!-- 炮管上部 -->
  <rect x="20" y="12" width="24" height="4" fill="#808080"/>
  <rect x="16" y="16" width="32" height="4" fill="#666666"/>
  <!-- 炮口区域（正面朝前，黑洞洞的炮口） -->
  <rect x="24" y="20" width="16" height="4" fill="#1A1A1A"/>
  <rect x="20" y="24" width="24" height="4" fill="#1A1A1A"/>
  <rect x="24" y="28" width="16" height="4" fill="#1A1A1A"/>
  <!-- 炮管外缘 -->
  <rect x="16" y="20" width="4" height="12" fill="#808080"/>
  <rect x="44" y="20" width="4" height="12" fill="#808080"/>
  <!-- 炮管下半部 -->
  <rect x="20" y="32" width="24" height="4" fill="#666666"/>
  <!-- 塔身连接处 -->
  <rect x="20" y="36" width="24" height="4" fill="#555555"/>
  <!-- 塔身主体 -->
  <rect x="20" y="40" width="24" height="4" fill="#666666"/>
  <rect x="20" y="44" width="24" height="4" fill="#666666"/>
  <!-- 塔身锈红色装饰带 -->
  <rect x="20" y="40" width="4" height="4" fill="#8B3A3A"/>
  <rect x="40" y="40" width="4" height="4" fill="#8B3A3A"/>
  <rect x="20" y="44" width="4" height="4" fill="#8B3A3A"/>
  <rect x="40" y="44" width="4" height="4" fill="#8B3A3A"/>
  <!-- 底座上层 -->
  <rect x="16" y="48" width="32" height="4" fill="#555555"/>
  <rect x="16" y="48" width="4" height="4" fill="#8B3A3A"/>
  <rect x="44" y="48" width="4" height="4" fill="#8B3A3A"/>
  <!-- 底座中层 -->
  <rect x="12" y="52" width="40" height="4" fill="#4A4A4A"/>
  <rect x="12" y="52" width="4" height="4" fill="#5C2525"/>
  <rect x="48" y="52" width="4" height="4" fill="#5C2525"/>
  <!-- 底座下层 -->
  <rect x="8" y="56" width="48" height="4" fill="#3A3A3A"/>
  <rect x="8" y="56" width="4" height="4" fill="#5C2525"/>
  <rect x="52" y="56" width="4" height="4" fill="#5C2525"/>
  <!-- 底座最底层 -->
  <rect x="4" y="60" width="56" height="4" fill="#333333"/>
</svg>