<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- 水晶尖端 -->
  <rect x="28" y="4" width="8" height="4" fill="#FFFFFF"/>
  <rect x="24" y="8" width="16" height="4" fill="#FFEA00"/>
  <!-- 水晶上部 -->
  <rect x="20" y="12" width="24" height="4" fill="#FFD600"/>
  <rect x="16" y="16" width="32" height="4" fill="#FFC107"/>
  <rect x="20" y="20" width="24" height="4" fill="#FFD600"/>
  <!-- 左侧电弧 -->
  <rect x="8" y="12" width="4" height="4" fill="#FFFFFF"/>
  <rect x="12" y="16" width="8" height="4" fill="#FFFFFF"/>
  <rect x="8" y="20" width="4" height="4" fill="#FFFFFF"/>
  <rect x="4" y="16" width="4" height="4" fill="#FFEA00"/>
  <!-- 右侧电弧 -->
  <rect x="52" y="12" width="4" height="4" fill="#FFFFFF"/>
  <rect x="44" y="16" width="8" height="4" fill="#FFFFFF"/>
  <rect x="52" y="20" width="4" height="4" fill="#FFFFFF"/>
  <rect x="56" y="16" width="4" height="4" fill="#FFEA00"/>
  <!-- 水晶中部 -->
  <rect x="16" y="24" width="32" height="4" fill="#FFC107"/>
  <rect x="20" y="28" width="24" height="4" fill="#FFD600"/>
  <!-- 发光核心 -->
  <rect x="24" y="32" width="16" height="4" fill="#FFFFFF"/>
  <rect x="20" y="36" width="24" height="4" fill="#FFEA00"/>
  <rect x="24" y="40" width="16" height="4" fill="#FFFFFF"/>
  <!-- 水晶下部 -->
  <rect x="20" y="44" width="24" height="4" fill="#FFC107"/>
  <!-- 底座上层 -->
  <rect x="16" y="48" width="32" height="4" fill="#283593"/>
  <rect x="16" y="48" width="4" height="4" fill="#1A237E"/>
  <rect x="44" y="48" width="4" height="4" fill="#1A237E"/>
  <!-- 底座中层 -->
  <rect x="12" y="52" width="40" height="4" fill="#1A237E"/>
  <rect x="12" y="52" width="4" height="4" fill="#0D1B5E"/>
  <rect x="48" y="52" width="4" height="4" fill="#0D1B5E"/>
  <!-- 底座下层 -->
  <rect x="8" y="56" width="48" height="4" fill="#0D1B5E"/>
  <rect x="8" y="56" width="4" height="4" fill="#070F3A"/>
  <rect x="52" y="56" width="4" height="4" fill="#070F3A"/>
  <!-- 底座最底层 -->
  <rect x="4" y="60" width="56" height="4" fill="#070F3A"/>
