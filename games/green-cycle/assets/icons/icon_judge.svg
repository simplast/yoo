<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- 外层光束 dark gold -->
  <rect x="8" y="8" width="2" height="24" fill="#B8860B"/>
  <rect x="22" y="8" width="2" height="24" fill="#B8860B"/>
  <!-- 第二层光束 goldenrod -->
  <rect x="10" y="4" width="2" height="24" fill="#DAA520"/>
  <rect x="20" y="4" width="2" height="24" fill="#DAA520"/>
  <!-- 第三层光束 gold -->
  <rect x="12" y="0" width="2" height="28" fill="#FFD700"/>
  <rect x="18" y="0" width="2" height="28" fill="#FFD700"/>
  <!-- 核心光束 亮金 + 白 -->
  <rect x="14" y="0" width="2" height="32" fill="#FFEC8B"/>
  <rect x="16" y="0" width="2" height="32" fill="#FFFFFF"/>
  <!-- 水平光芒射线 -->
  <rect x="2" y="6" width="6" height="2" fill="#FFD700"/>
  <rect x="24" y="6" width="6" height="2" fill="#FFD700"/>
  <rect x="3" y="14" width="6" height="2" fill="#FFEC8B"/>
  <rect x="23" y="14" width="6" height="2" fill="#FFEC8B"/>
  <rect x="2" y="22" width="6" height="2" fill="#FFD700"/>
  <rect x="24" y="22" width="6" height="2" fill="#FFD700"/>
  <!-- 对角线光芒 左上 -->
  <rect x="6" y="4" width="2" height="2" fill="#FFF8DC"/>
  <rect x="4" y="2" width="2" height="2" fill="#FFF8DC"/>
  <!-- 对角线光芒 右上 -->
  <rect x="24" y="4" width="2" height="2" fill="#FFF8DC"/>
  <rect x="26" y="2" width="2" height="2" fill="#FFF8DC"/>
  <!-- 对角线光芒 左下 -->
  <rect x="6" y="26" width="2" height="2" fill="#FFF8DC"/>
  <rect x="4" y="28" width="2" height="2" fill="#FFF8DC"/>
  <!-- 对角线光芒 右下 -->
  <rect x="24" y="26" width="2" height="2" fill="#FFF8DC"/>
  <rect x="26" y="28" width="2" height="2" fill="#FFF8DC"/>
  <!-- 散布光点 -->
  <rect x="6" y="10" width="2" height="2" fill="#FFFFFF"/>
  <rect x="24" y="10" width="2" height="2" fill="#FFFFFF"/>
  <rect x="6" y="18" width="2" height="2" fill="#FFFFFF"/>
  <rect x="24" y="18" width="2" height="2" fill="#FFFFFF"/>
  <rect x="4" y="14" width="2" height="2" fill="#FFF8DC"/>
  <rect x="26" y="14" width="2" height="2" fill="#FFF8DC"/>
  <rect x="4" y="22" width="2" height="2" fill="#FFF8DC"/>
  <rect x="26" y="22" width="2" height="2" fill="#FFF8DC"/>
  <!-- 光束底部冲击光晕 -->
  <rect x="6" y="30" width="20" height="2" fill="#FFEC8B"/>
  <rect x="8" y="29" width="16" height="1" fill="#FFD700"/>
</svg>