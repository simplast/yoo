<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Handle -->
  <rect x="14" y="1" width="4" height="10" fill="#8B6914"/>
  <rect x="15" y="1" width="2" height="10" fill="#A07818"/>
  <!-- Hammer head -->
  <rect x="5" y="11" width="22" height="8" fill="#FFD700"/>
  <rect x="5" y="11" width="22" height="2" fill="#FFC107"/>
  <!-- Hammer head highlight -->
  <rect x="7" y="13" width="3" height="5" fill="#FFF8DC"/>
  <rect x="22" y="13" width="3" height="5" fill="#FFF8DC"/>
  <!-- Hammer head detail -->
  <rect x="11" y="13" width="2" height="5" fill="#B8860B"/>
  <rect x="19" y="13" width="2" height="5" fill="#B8860B"/>
  <!-- Hammer head bottom -->
  <rect x="5" y="19" width="22" height="3" fill="#FF8C00"/>
  <rect x="5" y="19" width="22" height="1" fill="#FFA500"/>
  <!-- Impact burst glow -->
  <rect x="12" y="22" width="8" height="5" fill="#FFD700"/>
  <rect x="10" y="22" width="2" height="5" fill="#FFA500"/>
  <rect x="20" y="22" width="2" height="5" fill="#FFA500"/>
  <rect x="6" y="22" width="4" height="5" fill="#FF8C00"/>
  <rect x="22" y="22" width="4" height="5" fill="#FF8C00"/>
  <!-- Impact burst lines -->
  <rect x="2" y="24" width="4" height="3" fill="#FF8C00"/>
  <rect x="26" y="24" width="4" height="3" fill="#FF8C00"/>
  <rect x="4" y="27" width="4" height="2" fill="#FF8C00"/>
  <rect x="24" y="27" width="4" height="2" fill="#FF8C00"/>
  <rect x="8" y="27" width="4" height="2" fill="#FFA500"/>
  <rect x="20" y="27" width="4" height="2" fill="#FFA500"/>
  <rect x="12" y="27" width="8" height="3" fill="#FFD700"/>
  <!-- Impact center line -->
  <rect x="14" y="27" width="4" height="3" fill="#FFF8DC"/>
  <!-- Side impact sparks -->
  <rect x="0" y="22" width="2" height="2" fill="#FF8C00"/>
  <rect x="30" y="22" width="2" height="2" fill="#FF8C00"/>
  <rect x="1" y="20" width="2" height="2" fill="#FFA500"/>
  <rect x="29" y="20" width="2" height="2" fill="#FFA500"/>
</svg>